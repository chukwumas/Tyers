                    new Part { Text = "**Defining the Brand Structure**\n\nI'm solidifying the Tyers brand architecture. It seems like Tyers will be the parent entity, a Consulting & Venture Group. \"Tyers Bridge\" will be a subsidiary focused on Aviation, specifically within Nigeria. I'm visualizing a high-end, tech-forward aesthetic for Tyers: think minimalist design with bold color gradients, and clean typography. The target demographic seems to be global partners and executives.\n\n\n**Refining the Website Design**\n\nI'm now diving into the website's technical execution. My focus is on a single HTML file with embedded CSS and JavaScript, using semantic HTML5 and vanilla JavaScript for responsiveness. The color scheme is set: electric blue as primary, deep navy as secondary, magenta/purple for accents, and off-white for the background. Font selection is leaning towards a system sans-serif for a clean aesthetic. I'm prioritizing features such as a sticky header, hero section, about section, focus areas, Tyers Bridge teaser, value prop section, and a simple contact form. Animations will be smooth scroll, fade-in, hover states and a mobile menu.\n\n\n" },
                    new Part { Text = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Tyers | Orchestrating High-Leverage Partnerships</title>\n    <style>\n        :root {\n            --primary: #0066FF;\n            --primary-glow: rgba(0, 102, 255, 0.3);\n            --secondary: #0A192F;\n            --accent: #7000FF;\n            --bg-light: #F9FAFB;\n            --text-main: #1D1D1F;\n            --text-muted: #6E6E73;\n            --white: #FFFFFF;\n            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);\n        }\n\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n            font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n            -webkit-font-smoothing: antialiased;\n        }\n\n        html {\n            scroll-behavior: smooth;\n        }\n\n        body {\n            background-color: var(--bg-light);\n            color: var(--text-main);\n            line-height: 1.5;\n            overflow-x: hidden;\n        }\n\n        /* --- Animations --- */\n        .reveal {\n            opacity: 0;\n            transform: translateY(30px);\n            transition: var(--transition);\n        }\n\n        .reveal.active {\n            opacity: 1;\n            transform: translateY(0);\n        }\n\n        /* --- Navigation --- */\n        header {\n            position: fixed;\n            top: 0;\n            width: 100%;\n            height: 80px;\n            display: flex;\n            align-items: center;\n            justify-content: space-between;\n            padding: 0 5%;\n            background: rgba(255, 255, 255, 0.8);\n            backdrop-filter: blur(20px);\n            -webkit-backdrop-filter: blur(20px);\n            z-index: 1000;\n            border-bottom: 1px solid rgba(0, 0, 0, 0.05);\n        }\n\n        .logo {\n            font-size: 1.5rem;\n            font-weight: 800;\n            letter-spacing: -0.5px;\n            color: var(--secondary);\n            text-decoration: none;\n            display: flex;\n            align-items: center;\n        }\n\n        .logo span {\n            color: var(--primary);\n        }\n\n        .logo-dot {\n            width: 8px;\n            height: 8px;\n            background: var(--accent);\n            border-radius: 2px;\n            margin-left: 4px;\n        }\n\n        nav ul {\n            display: flex;\n            list-style: none;\n            gap: 32px;\n        }\n\n        nav ul li a {\n            text-decoration: none;\n            color: var(--text-main);\n            font-size: 0.95rem;\n            font-weight: 500;\n            transition: var(--transition);\n        }\n\n        nav ul li a:hover {\n            color: var(--primary);\n        }\n\n        .mobile-toggle {\n            display: none;\n            cursor: pointer;\n            font-size: 1.5rem;\n        }\n\n        /* --- Hero Section --- */\n        .hero {\n            height: 100vh;\n            display: flex;\n            flex-direction: column;\n            justify-content: center;\n            align-items: center;\n            text-align: center;\n            padding: 0 10%;\n            background: radial-gradient(circle at top right, rgba(0, 102, 255, 0.05), transparent),\n                        radial-gradient(circle at bottom left, rgba(112, 0, 255, 0.05), transparent);\n        }\n\n        .hero h1 {\n            font-size: clamp(2.5rem, 6vw, 4.5rem);\n            font-weight: 800;\n            line-height: 1.1;\n            margin-bottom: 24px;\n            letter-spacing: -0.03em;\n            background: linear-gradient(135deg, var(--secondary) 30%, var(--primary) 100%);\n            -webkit-background-clip: text;\n            -webkit-text-fill-color: transparent;\n        }\n\n        .hero p {\n            font-size: clamp(1.1rem, 2vw, 1.4rem);\n            color: var(--text-muted);\n            max-width: 700px;\n            margin-bottom: 40px;\n        }\n\n        .btn-group {\n            display: flex;\n            gap: 16px;\n        }\n\n        .btn {\n            padding: 16px 32px;\n            border-radius: 12px;\n            font-size: 1rem;\n            font-weight: 600;\n            text-decoration: none;\n            transition: var(--transition);\n            cursor: pointer;\n            border: none;\n        }\n\n        .btn-primary {\n            background: var(--primary);\n            color: var(--white);\n            box-shadow: 0 10px 20px var(--primary-glow);\n        }\n\n        .btn-primary:hover {\n            transform: translateY(-2px);\n            box-shadow: 0 15px 30px var(--primary-glow);\n        }\n\n        .btn-secondary {\n            background: transparent;\n            color: var(--text-main);\n            border: 1px solid rgba(0, 0, 0, 0.1);\n        }\n\n        .btn-secondary:hover {\n            background: rgba(0, 0, 0, 0.02);\n            border-color: rgba(0, 0, 0, 0.2);\n        }\n\n        /* --- Sections General --- */\n        section {\n            padding: 120px 10%;\n        }\n\n        .section-header {\n            max-width: 600px;\n            margin-bottom: 64px;\n        }\n\n        .section-header h2 {\n            font-size: 2.5rem;\n            font-weight: 700;\n            margin-bottom: 16px;\n            letter-spacing: -0.02em;\n        }\n\n        .tag {\n            display: inline-block;\n            padding: 4px 12px;\n            background: rgba(0, 102, 255, 0.1);\n            color: var(--primary);\n            border-radius: 20px;\n            font-size: 0.85rem;\n            font-weight: 700;\n            margin-bottom: 16px;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n\n        /* --- About Section --- */\n        .about-grid {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 80px;\n            align-items: center;\n        }\n\n        .about-content p {\n            font-size: 1.2rem;\n            color: var(--text-muted);\n            margin-bottom: 24px;\n        }\n\n        .about-list {\n            list-style: none;\n        }\n\n        .about-list li {\n            margin-bottom: 12px;\n            display: flex;\n            align-items: center;\n            font-weight: 600;\n            color: var(--secondary);\n        }\n\n        .about-list li::before {\n            content: \"→\";\n            margin-right: 12px;\n            color: var(--primary);\n        }\n\n        /* --- Focus Areas --- */\n        .focus-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n            gap: 32px;\n        }\n\n        .focus-card {\n            background: var(--white);\n            padding: 40px;\n            border-radius: 24px;\n            border: 1px solid rgba(0, 0, 0, 0.05);\n            transition: var(--transition);\n        }\n\n        .focus-card:hover {\n            transform: translateY(-10px);\n            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);\n            border-color: var(--primary-glow);\n        }\n\n        .focus-icon {\n            width: 48px;\n            height: 48px;\n            background: var(--bg-light);\n            border-radius: 12px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            margin-bottom: 24px;\n            font-size: 1.5rem;\n        }\n\n        .focus-card h3 {\n            margin-bottom: 12px;\n            font-size: 1.25rem;\n        }\n\n        .focus-card p {\n            color: var(--text-muted);\n        }\n\n        /* --- Tyers Bridge (Special Section) --- */\n        .bridge-section {\n            background: var(--secondary);\n            color: var(--white);\n            border-radius: 40px;\n            margin: 0 5% 120px;\n            padding: 80px 10%;\n            position: relative;\n            overflow: hidden;\n        }\n\n        .bridge-section::before {\n            content: \"\";\n            position: absolute;\n            top: -50%;\n            right: -10%;\n            width: 500px;\n            height: 500px;\n            background: radial-gradient(circle, var(--accent), transparent 70%);\n            opacity: 0.15;\n        }\n\n        .bridge-tag {\n            background: rgba(255, 255, 255, 0.1);\n            color: var(--white);\n        }\n\n        .bridge-content h2 {\n            font-size: 3rem;\n            margin-bottom: 24px;\n        }\n\n        .bridge-content p {\n            font-size: 1.25rem;\n            opacity: 0.8;\n            max-width: 600px;\n            margin-bottom: 40px;\n        }\n\n        .bridge-form {\n            display: flex;\n            gap: 12px;\n            max-width: 500px;\n        }\n\n        .bridge-form input {\n            flex: 1;\n            padding: 16px 24px;\n            border-radius: 12px;\n            border: none;\n            background: rgba(255, 255, 255, 0.1);\n            color: var(--white);\n            outline: none;\n            border: 1px solid rgba(255, 255, 255, 0.1);\n        }\n\n        .bridge-form input::placeholder {\n            color: rgba(255, 255, 255, 0.5);\n        }\n\n        .bridge-form .btn {\n            background: var(--white);\n            color: var(--secondary);\n        }\n\n        /* --- Why Tyers --- */\n        .why-grid {\n            display: grid;\n            grid-template-columns: repeat(2, 1fr);\n            gap: 40px;\n        }\n\n        .why-item h4 {\n            font-size: 1.4rem;\n            margin-bottom: 8px;\n            color: var(--secondary);\n        }\n\n        /* --- Contact --- */\n        .contact-container {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 80px;\n        }\n\n        .contact-form {\n            background: var(--white);\n            padding: 40px;\n            border-radius: 24px;\n            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);\n        }\n\n        .form-group {\n            margin-bottom: 20px;\n        }\n\n        .form-group label {\n            display: block;\n            font-size: 0.85rem;\n            font-weight: 600;\n            margin-bottom: 8px;\n            color: var(--text-muted);\n        }\n\n        .form-group input, .form-group textarea {\n            width: 100%;\n            padding: 12px 16px;\n            border-radius: 8px;\n            border: 1px solid rgba(0, 0, 0, 0.1);\n            outline: none;\n            transition: var(--transition);\n        }\n\n        .form-group input:focus, .form-group textarea:focus {\n            border-color: var(--primary);\n        }\n\n        /* --- Footer --- */\n        footer {\n            padding: 60px 10%;\n            background: #fff;\n            border-top: 1px solid rgba(0, 0, 0, 0.05);\n            text-align: center;\n        }\n\n        .footer-logo {\n            margin-bottom: 20px;\n        }\n\n        .footer-copy {\n            color: var(--text-muted);\n            font-size: 0.9rem;\n        }\n\n        .footer-subsidiary {\n            margin-top: 12px;\n            font-size: 0.8rem;\n            color: var(--primary);\n            font-weight: 500;\n        }\n\n        /* --- Responsive --- */\n        @media (max-width: 968px) {\n            .about-grid, .why-grid, .contact-container {\n                grid-template-columns: 1fr;\n                gap: 40px;\n            }\n            header nav {\n                display: none;\n            }\n            .mobile-toggle {\n                display: block;\n            }\n            .hero h1 {\n                font-size: 3rem;\n            }\n            .bridge-content h2 {\n                font-size: 2.2rem;\n            }\n            .bridge-form {\n                flex-direction: column;\n            }\n        }\n    </style>\n</head>\n<body>\n\n    <header>\n        <a href=\"#\" class=\"logo\">Tyers<span>.</span><div class=\"logo-dot\"></div></a>\n        <nav>\n            <ul>\n                <li><a href=\"#about\">About</a></li>\n                <li><a href=\"#focus\">Focus Areas</a></li>\n                <li><a href=\"#bridge\">Tyers Bridge</a></li>\n                <li><a href=\"#why\">Why Tyers</a></li>\n                <li><a href=\"#contact\">Contact</a></li>\n            </ul>\n        </nav>\n        <div class=\"mobile-toggle\">☰</div>\n    </header>\n\n    <main>\n        <!-- Hero Section -->\n        <section class=\"hero\">\n            <h1 class=\"reveal\">Orchestrating the next wave of high‑leverage partnerships.</h1>\n            <p class=\"reveal\">We connect global capacity with frontier demand—designing bold, capital-light plays across infrastructure, technology, and emerging markets.</p>\n            <div class=\"btn-group reveal\">\n                <a href=\"#contact\" class=\"btn btn-primary\">Talk to Tyers</a>\n                <a href=\"#focus\" class=\"btn btn-secondary\">Explore focus areas</a>\n            </div>\n        </section>\n\n        <!-- About Section -->\n        <section id=\"about\" class=\"reveal\">\n            <div class=\"about-grid\">\n                <div class=\"about-header\">\n                    <span class=\"tag\">The Group</span>\n                    <h2>A Strategy‑Led Venture Powerhouse</h2>\n                </div>\n                <div class=\"about-content\">\n                    <p>Tyers is a modern consulting and venture group designed to help global players unlock high-growth opportunities in emerging landscapes.</p>\n                    <p>We operate with a lean, strategy-first model that prioritizes partnership structuring over heavy asset ownership.</p>\n                    <ul class=\"about-list\">\n                        <li>Strategy & Concept Design</li>\n                        <li>Partnership Structuring</li>\n                        <li>Market Entry & Activation</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n        <!-- Focus Areas -->\n        <section id=\"focus\" class=\"reveal\">\n            <div class=\"section-header\">\n                <span class=\"tag\">Pillars</span>\n                <h2>Focus Areas</h2>\n            </div>\n            <div class=\"focus-grid\">\n                <div class=\"focus-card\">\n                    <div class=\"focus-icon\">✈️</div>\n                    <h3>Aviation & Mobility</h3>\n                    <p>Designing the frameworks for next-generation transport networks and carrier partnerships.</p>\n                </div>\n                <div class=\"focus-card\">\n                    <div class=\"focus-icon\">☁️</div>\n                    <h3>Digital Platforms</h3>\n                    <p>Scaling digital infrastructure that connects services to users in rapidly growing markets.</p>\n                </div>\n                <div class=\"focus-card\">\n                    <div class=\"focus-icon\">📈</div>\n                    <h3>Market Entry</h3>\n                    <p>Providing the tactical roadmap and local orchestration for global brands entering new regions.</p>\n                </div>\n                <div class=\"focus-card\">\n                    <div class=\"focus-icon\">🚀</div>\n                    <h3>Venture Co‑Creation</h3>\n                    <p>Building alongside founders to create capital-light, high-leverage startups from zero.</p>\n                </div>\n            </div>\n        </section>\n\n        <!-- Tyers Bridge Section -->\n        <section id=\"bridge\" class=\"bridge-section reveal\">\n            <div class=\"bridge-content\">\n                <span class=\"tag bridge-tag\">Subsidiary Spotlight</span>\n                <h2>Tyers Bridge – <br>Coming Soon</h2>\n                <p>Bridging global carriers and Nigeria’s domestic skies. We are designing the future of aviation partnerships to unlock domestic route potential.</p>\n                <p style=\"font-style: italic; font-size: 1rem;\">The precision of leading airlines, blended with Tyers’ partnership DNA—soon landing in Nigeria.</p>\n                \n                <form class=\"bridge-form\" onsubmit=\"handleNotify(event)\">\n                    <input type=\"email\" id=\"bridge-email\" placeholder=\"Enter your email for updates\" required>\n                    <button type=\"submit\" class=\"btn\">Notify Me</button>\n                </form>\n            </div>\n        </section>\n\n        <!-- Why Tyers -->\n        <section id=\"why\" class=\"reveal\">\n            <div class=\"section-header\">\n                <span class=\"tag\">Value</span>\n                <h2>Why Tyers</h2>\n            </div>\n            <div class=\"why-grid\">\n                <div class=\"why-item\">\n                    <h4>Partnership-First Design</h4>\n                    <p>We don't just advise; we architect the relationships that make market entry sustainable.</p>\n                </div>\n                <div class=\"why-item\">\n                    <h4>Capital-Light, Impact-Heavy</h4>\n                    <p>Our model focuses on strategic leverage and intellectual capital to drive massive results.</p>\n                </div>\n                <div class=\"why-item\">\n                    <h4>Frontier Expertise</h4>\n                    <p>Specialized focus on emerging markets where growth is high but complexity is higher.</p>\n                </div>\n                <div class=\"why-item\">\n                    <h4>Concept to Activation</h4>\n                    <p>We stay with the project from the first slide to the first operational milestone.</p>\n                </div>\n            </div>\n        </section>\n\n        <!-- Contact Section -->\n  