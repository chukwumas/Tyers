                {
                    new Part { Text = "You are an expert front-end developer, UX/UI designer, and brand stylist.\n\nYOUR TASK  \nDesign and code a modern, single-page marketing website for a consulting & venture group called **Tyers**. The goal is to make Tyers look like a high-caliber, high-growth tech disruptor and consulting group, with a future aviation partnership subsidiary called **Tyers Bridge** that will soon launch in Nigeria.\n\nIMPORTANT REQUIREMENTS  \n- Output: A single, self-contained HTML file with embedded CSS and minimal vanilla JavaScript (no external frameworks like React, no build tools).\n- Style priority: Strong visual identity, beautiful layout, clean code structure, easy to customize.\n- Use clear, semantic HTML5 structure: `<header>`, `<main>`, `<section>`, `<footer>`, etc.\n- Make it fully responsive: looks great on mobile, tablet, and desktop.\n- Do not include explanations or comments, just the code.\n\n=====================================\nBRAND & VISUAL VIBE\n=====================================\nBrand name: **Tyers**\n\nBrand concept:  \nTyers is a forward-looking **group** that builds and orchestrates high-leverage partnerships—especially at the intersection of technology, infrastructure, and emerging markets. It combines the sharpness of a strategy consulting firm with the energy of a modern tech startup.\n\nVisual feel:  \n- Modern, energetic, confident  \n- Feels like a **high-growth tech disruptor** that also has consulting‑firm credibility  \n- Inspired by Apple-style minimalism in typography and layout  \n- Strong colors and gradients, but still clean and professional  \n- Light use of **subtle animations** (e.g., fade in, hover effects, smooth scrolling)\n\nColors (you can choose exact values, but follow this direction):  \n- Primary: A bold electric blue or teal  \n- Secondary: A deep navy or charcoal for text/background contrast  \n- Accent: A vibrant magenta or purple for buttons/accents  \n- Background: A lot of white or very light gray for a clean, spacious feel\n\nTypography:  \n- Use Google Fonts or system-safe fonts that feel **minimalistic and strong** (e.g., SF-like or similar clean sans-serif).  \n- Headings: strong, bold, with plenty of whitespace (Apple-like).  \n- Body: clean, highly legible.\n\n=====================================\nLOGO DIRECTION\n=====================================\nCreate a simple, text-based logo treatment at the top-left of the site (no actual image files needed, just styled text and maybe a simple geometric shape using CSS):\n\n- Brand name: **Tyers**\n- Logo style:  \n  - Clean wordmark  \n  - Slight letter spacing  \n  - One letter or small geometric shape can have an accent color (e.g., the “T” or “s” in Tyers, or a small circle/square next to the name)  \n- It should feel like a modern tech/consulting brand, not playful.\n\nYou can simulate the logo using HTML and CSS (e.g., a `<span>` with special styling) – no need for SVG files.\n\n=====================================\nCONTENT & STRUCTURE\n=====================================\n\nThe site should feel like Tyers **already exists and is real**, but keep copy concise, confident, and not overly detailed. Avoid long walls of text.\n\nOverall structure (single page with smooth scroll navigation):\n\n1. **Sticky Header / Navigation**\n   - Left: Tyers logo\n   - Right: Navigation links that smoothly scroll to sections:\n     - About\n     - Focus Areas\n     - Tyers Bridge\n     - Why Tyers\n     - Contact\n\n2. **Hero Section (Above the Fold)**\n   Purpose: Immediately communicate that Tyers is a modern group that builds strategic, high-leverage partnerships.\n\n   Include:\n   - Strong headline, e.g.:  \n     “Tyers: Orchestrating the next wave of high‑leverage partnerships.”\n   - Subheadline that hints at sector reach and emerging markets, e.g.:  \n     “We connect global capacity with frontier demand—designing bold, capital-light plays across sectors like aviation and infrastructure.”\n   - Primary call-to-action button: “Talk to Tyers”\n   - Secondary link/button: “Explore our focus areas”\n   - A subtle background gradient and/or abstract shapes (using CSS) that make it feel sophisticated and modern.\n\n3. **About Tyers Section**\n   Briefly explain:\n   - Tyers is a **group** that:\n     - Designs partnership-driven market entries\n     - Helps global players unlock emerging market opportunities\n     - Operates with a lean, strategy-led, capital-light model\n   - Keep it 2–3 short paragraphs max, plus a small bullet list of what Tyers does (e.g. “Strategy & concept design”, “Partnership structuring”, “Market activation”).\n\n4. **Focus Areas Section**\n   Present **3–4 focus pillars** as cards or columns. One of them will be aviation-related but described at a group level (not too detailed).\n\n   Example pillars (you can refine wording):\n   - “Aviation & Mobility Partnerships”\n   - “Digital Infrastructure & Platforms”\n   - “Market Entry & Go-to-Market Strategy”\n   - “Venture Co-Creation in Emerging Markets”\n\n   For each:\n   - Short title\n   - 2–3 line description\n   - Simple icon representation using CSS or emoji fallback (no external image assets required).\n\n5. **Tyers Bridge (Subsidiary Teaser) Section**\n   This is important: it should **tease** Tyers Bridge as an upcoming aviation partnership initiative without going deep into operational details.\n\n   Section design:\n   - Title: “Tyers Bridge – Coming Soon”\n   - Subheading that frames it as an aviation and partnership play, e.g.:  \n     “Bridging global carriers and Nigeria’s domestic skies.”\n   - Very short description (2–3 sentences) that communicates:  \n     - Tyers Bridge is a planned Tyers Group subsidiary.  \n     - It will help international aviation partners unlock domestic route potential in Nigeria and similar markets.  \n     - It positions Tyers as the strategic local orchestrator, not an airline itself.\n   - Add a tagline like:  \n     “Think the precision of leading airlines, blended with Tyers’ partnership DNA—soon landing in Nigeria.”\n   - Include a simple “Notify me” style call-to-action (button or form) that collects an email address (no backend needed, just a front-end form with a placeholder “Thank you” message handled by basic JavaScript alert).\n\n   Keep this section **clean**. Do not dive into technical or regulatory details; just position it aspirationally.\n\n6. **Why Tyers Section**\n   This should make Tyers feel credible and compelling to serious partners and executives.\n\n   Use a 2–3 column layout or card layout with short reasons, such as:\n   - “Partnership-first design”\n   - “Capital-light, impact-heavy strategy”\n   - “Deep focus on emerging and frontier markets”\n   - “From concept to market activation”\n\n   Each reason: 1 short title + 1–2 lines of explanation.\n\n7. **Call to Action / Contact Section**\n   Keep it simple and professional:\n   - Short line like: “Ready to explore what we can build together?”\n   - A minimal contact form with fields:\n     - Name\n     - Company\n     - Email\n     - Message\n   - Simple front-end validation (e.g., ensure email is not empty; show a basic success message using JavaScript `alert()` or an inline message).\n\n8. **Footer**\n   - Tyers name and current year.\n   - Simple text like: “Tyers Group – All rights reserved.”\n   - Optional: small text for “Tyers Bridge – aviation partnership subsidiary (coming soon).”\n\n=====================================\nINTERACTION & ANIMATION\n=====================================\n- Add smooth scrolling when clicking nav links.\n- Use subtle hover effects on buttons and cards (slight scale, shadow, or color change).\n- Add subtle fade-in or slide-up animations for sections on scroll, implemented with minimal JavaScript and CSS (no heavy libraries).\n- Keep everything tasteful and not overdone.\n\n=====================================\nTECHNICAL REQUIREMENTS\n=====================================\n- Single HTML file with embedded `<style>` and `<script>` sections.\n- No external JS frameworks like React, Vue, etc.\n- No build tools, just pure HTML/CSS/JS.\n- Use flexbox and/or CSS grid for layout.\n- Ensure it looks good on:\n  - Mobile (small screens)\n  - Tablets\n  - Desktop\n\n=====================================\nOUTPUT FORMAT\n=====================================\nReturn ONLY the complete HTML code for the page. Do not wrap it in markdown code fences and do not include any explanations or extra text." },
